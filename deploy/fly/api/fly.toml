app = "scrutinize-api"
primary_region = "ord"

[build]
  dockerfile = "../../../backend/Dockerfile"

[env]
  ENVIRONMENT = "production"
  DEBUG = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # budget: scale to zero; use 1 for always-on

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  memory = "512mb"           # 256mb OOMs under load; 512mb minimum for API
  cpu_kind = "shared"
  cpus = 1

# No [checks] — a 15s /health check keeps the machine awake and pings Redis,
# preventing budget scale-to-zero. Frontend wake uses GET /health on landing.
