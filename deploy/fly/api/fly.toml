app = "scrutinize-api"
primary_region = "ord"

[build]
  dockerfile = "../../../backend/Dockerfile"

[env]
  ENVIRONMENT = "production"
  DEBUG = "false"
  PORT = "8000"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # budget: scale to zero; use 1 for always-on
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 8000
    timeout = "10s"
    type = "http"

[[vm]]
  memory = "512mb"           # 256mb OOMs under load; 512mb minimum for API
  cpu_kind = "shared"
  cpus = 1
