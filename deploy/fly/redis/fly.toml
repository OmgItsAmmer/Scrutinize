app = "scrutinize-redis"
primary_region = "ord"

[build]
  image = "redis:alpine"

[env]
  # Optional: set a password if you want more than network-level security
  # REDIS_PASSWORD = "..."

[[services]]
  internal_port = 6379
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 6379

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
