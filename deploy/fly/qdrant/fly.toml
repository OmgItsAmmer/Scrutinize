app = "scrutinize-qdrant"
primary_region = "ord"

[build]
  image = "qdrant/qdrant:v1.18.2"

[mounts]
  source = "qdrant_data"
  destination = "/qdrant/storage"

[[services]]
  protocol = "tcp"
  internal_port = 6333
  processes = ["app"]

  [[services.ports]]
    port = 6333

# No [checks] — avoid keeping the machine awake between user visits.
