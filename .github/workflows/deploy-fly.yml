name: Deploy Fly

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "deploy/fly/**"
      - ".github/workflows/deploy-fly.yml"
  workflow_dispatch:

concurrency:
  group: deploy-fly-${{ github.ref }}
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy-api:
    name: Deploy scrutinize-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        working-directory: backend
        run: flyctl deploy --config ../deploy/fly/api/fly.toml --ha=false

  # Worker and Redis are NOT auto-deployed — scale manually when needed:
  #   fly scale count worker=1 -a scrutinize-worker
  #   fly deploy -c deploy/fly/redis/fly.toml -a scrutinize-redis  (rare)
