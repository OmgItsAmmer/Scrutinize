name: Deploy Fly

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "deploy/fly/**"
      - ".github/workflows/deploy-fly.yml"
  workflow_dispatch:

concurrency:
  group: deploy-fly-${{ github.ref }}
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy-api:
    name: Deploy scrutinize-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        working-directory: backend
        run: flyctl deploy --config ../deploy/fly/api/fly.toml --ha=false

  deploy-worker:
    name: Deploy scrutinize-worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy worker
        working-directory: backend
        run: flyctl deploy --config ../deploy/fly/worker/fly.toml --ha=false

  deploy-redis:
    name: Deploy scrutinize-redis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Redis
        run: flyctl deploy --config deploy/fly/redis/fly.toml --ha=false

  deploy-qdrant:
    name: Deploy scrutinize-qdrant
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Qdrant
        run: flyctl deploy --config deploy/fly/qdrant/fly.toml --ha=false
